# Cấu hình cổng chạy backend
server.port=8080

# Cấu hình kết nối MySQL (Đã thêm allowPublicKeyRetrieval)
spring.datasource.url=jdbc:mysql://localhost:3306/expense_manager?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Cấu hình JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Dòng chốt hạ fix lỗi Dialect: Chỉ định rõ dùng ngữ pháp MySQL
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

